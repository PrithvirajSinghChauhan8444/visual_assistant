<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diana Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <!-- Three.js 3D viewport -->
  <div id="canvas-container"></div>

  <!-- Glassmorphism Chat Bubble -->
  <div id="chat-bubble" class="hidden">
    <div class="bubble-header">
      <span class="pulse-indicator"></span>
      <span class="companion-name">DIANA</span>
    </div>
    <div id="bubble-text">Initializing companion...</div>
    <!-- Sound-reactive procedural voice visualizer -->
    <canvas id="soundwave-canvas"></canvas>
    <div class="glow-border"></div>
  </div>

  <!-- Status Debug HUD -->
  <div id="status-panel">
    <div class="status-row">
      <span class="label">Status:</span>
      <span id="status-val" class="status-active">CONNECTING</span>
    </div>
    <div class="status-row">
      <span class="label">Model:</span>
      <span id="model-val">Diana v2 (VRM)</span>
    </div>
    <div class="status-row">
      <span class="label">Speech:</span>
      <span id="speech-val">Offline</span>
    </div>
  </div>

  <!-- Glassmorphism Motion Pane -->
  <div id="motion-panel">
    <div class="panel-header">MOTION CONTROL</div>
    <div class="motion-buttons">
      <button class="motion-btn active" data-motion="idle" title="Default Idle">
        <span class="motion-icon">🧘</span>
        <span class="motion-name">Default Idle</span>
      </button>
      <button class="motion-btn" data-motion="wave" title="Say Hello">
        <span class="motion-icon">👋</span>
        <span class="motion-name">Wave Hello</span>
      </button>
      <button class="motion-btn" data-motion="think" title="Ponder & Shift">
        <span class="motion-icon">🤔</span>
        <span class="motion-name">Think / Ponder</span>
      </button>
      <button class="motion-btn" data-motion="dance" title="Happy Dance">
        <span class="motion-icon">💃</span>
        <span class="motion-name">Happy Dance</span>
      </button>
      <button class="motion-btn" data-motion="bow" title="Polite Bow">
        <span class="motion-icon">🙇</span>
        <span class="motion-name">Polite Bow</span>
      </button>
      <button class="motion-btn" data-motion="celebrate" title="Celebrate Joy">
        <span class="motion-icon">🎉</span>
        <span class="motion-name">Celebrate</span>
      </button>
    </div>
    <div class="motion-custom">
      <input type="text" id="custom-motion-input" placeholder="Motion prompt (e.g. backflip)..." />
      <button id="custom-motion-btn" title="Synthesize Motion via Diffusion">Go</button>
    </div>
  </div>

  <!-- Glassmorphism Theme & Gaze Control Panel -->
  <div id="theme-panel">
    <div class="panel-header">CORE CONFIG</div>
    <div class="theme-buttons">
      <button class="theme-btn active" data-theme="pink" title="Hologram Pink">
        <span class="color-dot pink"></span>
      </button>
      <button class="theme-btn" data-theme="cyan" title="Cyberpunk Cyan">
        <span class="color-dot cyan"></span>
      </button>
      <button class="theme-btn" data-theme="green" title="Matrix Green">
        <span class="color-dot green"></span>
      </button>
      <button class="theme-btn" data-theme="orange" title="Solana Orange">
        <span class="color-dot orange"></span>
      </button>
    </div>
    <div class="control-row">
      <span class="label">Gaze Tracking</span>
      <label class="switch">
        <input type="checkbox" id="gaze-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="control-row rotation-control">
      <div class="control-label-row">
        <span class="label">Model Rotation</span>
        <div class="rotation-indicator-group">
          <span id="rotation-val">0°</span>
          <button id="reset-rotation-btn" title="Reset Rotation">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"></path>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
        </div>
      </div>
      <input type="range" id="rotation-slider" min="-180" max="180" value="0" class="premium-slider">
    </div>
    <div class="control-row zoom-control">
      <div class="control-label-row">
        <span class="label">Camera Zoom</span>
        <div class="zoom-indicator-group">
          <span id="zoom-val">100%</span>
          <button id="reset-zoom-btn" title="Reset Zoom">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"></path>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
        </div>
      </div>
      <input type="range" id="zoom-slider" min="1.5" max="6.0" step="0.1" value="3.8" class="premium-slider">
    </div>
  </div>

  <!-- Centered Glassmorphic Chat Input Bar -->
  <div id="input-container">
    <input type="text" id="chat-input" placeholder="Type a message for Diana..." autocomplete="off">
    <button id="send-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
